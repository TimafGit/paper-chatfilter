# ChatFilter Configuration
# After editing this file, run /chatfilter reload in-game to apply changes
# without restarting the server.

# Words to block (case-insensitive, automatically lowercased).
# Note: matching is done on the normalized message (special characters and
# spaces are stripped), so variations like "a.m.k" or "a m k" will also be caught.
# Note: substring matching is used, so if "example" is banned, "exampleword" will also be caught.
banned-words:
  - "example1"
  - "example2"

# Messages shown on screen (bold red title) when a violation is detected.
# One is chosen at random each time.
warning-messages:
  - "Watch your language!"
  - "That's not allowed here!"
  - "Keep it clean!"
  - "Mind your words!"

# Sound settings
sound:
  # Vanilla Minecraft sound event keys (one is chosen at random each time).
  # Full list: https://jd.papermc.io/paper/26.1.2/io/papermc/paper/registry/keys/SoundEventKeys.html
  options:
    - "entity.ghast.hurt"
  # Volume (0.0 - 1.0)
  volume: 1.0
  # Pitch (0.5 - 2.0, 1.0 = normal)
  pitch: 0.8

# Potion effects applied to the player on each violation.
# All effects in this list are applied simultaneously.
#
# type:             effect name (case-insensitive). Examples:
#                   blindness, slowness, nausea, weakness, hunger, poison, darkness
#                   Full list: https://jd.papermc.io/paper/26.1.2/org/bukkit/potion/PotionEffectType.html
#
# Specify duration using ONE of the following (not both):
#   duration-seconds: 1    (recommended)
#   duration-ticks:   20   (20 ticks = 1 second)
#
# amplifier:        effect strength (0 = level I, 1 = level II, ...)
effects:
  - type: "blindness"
    duration-seconds: 3
    amplifier: 2
  - type: "slowness"
    duration-seconds: 3
    amplifier: 0
  - type: "nausea"
    duration-seconds: 7
    amplifier: 1

# Kick system — automatically kicks players who exceed the violation threshold.
kick:
  # Set to true to enable, false to disable.
  enabled: true
  # Number of violations before the player is kicked.
  threshold: 4
  # Message shown to the player on the kick screen.
  message: "You have been kicked for repeated use of banned words."